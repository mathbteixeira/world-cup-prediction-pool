services:
  postgres:
    image: postgres:15.8
    container_name: world-cup-prediction-pool-postgres
    environment:
      POSTGRES_DB: prediction_pool
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d prediction_pool"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
