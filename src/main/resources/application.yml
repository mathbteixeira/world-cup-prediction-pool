spring:
  application:
    name: world-cup-prediction-pool
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prediction_pool}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  jwt:
    issuer: world-cup-prediction-pool
    secret: ${APP_JWT_SECRET:U3ByaW5nQm9vdDMtV29ybGRDdXAtUHJlZGljdGlvblBvb2wtRGV2U2VjcmV0LTI1Ni1CaXQ=}
    access-token-ttl: PT2H
springdoc:
  swagger-ui:
    path: /swagger-ui.html
